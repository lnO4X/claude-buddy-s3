; clawstick — PlatformIO config for M5StickS3
;
; Upstream attribution: anthropics/claude-desktop-buddy (MIT).
; Diverges from upstream platformio.ini in: env name, board, framework
; build_flags (S3 PSRAM + USB-CDC), partition table (8 MB vs 4 MB), lib_deps
; (M5Unified vs M5StickCPlus).
;
; Phase C decisions applied (per projects/clawstick/plan/PLAN.md §3):
;   - C1 lib swap: m5stack/M5Unified replaces m5stack/M5StickCPlus
;   - C2 board: m5stack-stamps3 + Octal PSRAM build_flags (StampS3 is the
;     closest PIO entry to StickS3 — same ESP32-S3 + 8 MB flash + same SKU
;     family. Custom boards/m5sticks3.json fallback if PSRAM init fails at C5.)
;   - C4 partition: partitions/no_ota_8mb.csv (8 MB layout, no OTA, big SPIFFS)
;
; PSRAM cache-issue flag (-mfix-esp32-psram-cache-issue) intentionally omitted:
; that workaround is for ESP32 (LX6) only, not ESP32-S3 (LX7).

[env:clawstick-s3]
platform = espressif32@7.0.0
framework = arduino
board = m5stack-stamps3
monitor_speed = 115200

board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions/no_ota_8mb.csv
board_build.filesystem = littlefs

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Top-of-screen display name. Override per-deploy via:
    ;   pio run -e clawstick-s3 -t upload --project-option \
    ;     'build_flags=-DBUDDY_DISPLAY_NAME="\"MyBuddy\""'
    ; Or use scripts/flash-with-name.sh for convenience.
    ; BLE advertising name is separately Claude-XXXX (G12 — Hardware Buddy
    ; filter requirement; not user-customizable without forking patcher).
    -DBUDDY_DISPLAY_NAME=\"Claude\"

; ESP32-S3 native USB: use USB-CDC protocol to enter bootloader cleanly
; (DTR/RTS dance doesn't work like classic USB-UART bridges).
upload_flags =
    --before=usb_reset
    --after=hard_reset

lib_deps =
    m5stack/M5Unified
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
; BLE: use Arduino-ESP32 stock BlueDroid (BLEDevice.h, BLE2902, BLESecurity)
; — bundled with framework-arduinoespressif32, no lib_dep needed.
; Switched from NimBLE-Arduino @ ^2.0.0 (D2 first attempt) to match upstream
; exactly per gotcha G8 (Hardware Buddy didn't see NimBLE-advertised device);
; upstream's encrypted NUS + LE Secure Connections passkey pairing is what
; Hardware Buddy app expects. Memory cost +500KB Flash vs NimBLE acceptable
; on 8 MB flash. See gotcha G9.
